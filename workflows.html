  const [linkOn, setLinkOn] = useState(true);
  const [linkExpiry, setLinkExpiry] = useState("30d");

  const invite = () => {
    const v = draft.trim();
    if (!v) return;
    const email = /@/.test(v) ? v : `${v.toLowerCase().replace(/\s+/g, ".")}@abc.com`;
    const initials = email.split("@")[0].split(/[._-]/).map(p => p[0]?.toUpperCase()).slice(0, 2).join("");
    setPeople(p => [...p, { email, role: "View only", initials: initials || "?", bg: "#e0e7ff", fg: "#3730a3" }]);
    setDraft("");
    toast(`Invited ${email}`);

  const removePerson = (email) => {
    setPeople(p => p.filter(x => x.email !== email));
    toast(`Removed ${email}`, { kind: "info" });

  const cyclePermission = (email) => {
    const next = { "View only": "View + AI", "View + AI": "Edit", "Edit": "View only", "Owner": "Owner" };
    setPeople(p => p.map(x => x.email === email ? { ...x, role: next[x.role] || "View only" } : x));
  };
  const copyInternalLink = () => {
    const slug = dashboard.title.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
    try { navigator.clipboard?.writeText(`https://abc.netskope.com/analytics/dashboards/${slug}?expires=${linkExpiry}`); } catch {}
    toast("Internal link copied to clipboard");

    const id = Math.random().toString(36).slice(2, 10);

                className="flex-1 text-[12.5px] border border-slate-300 rounded-md px-2.5 py-1.5 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 focus:outline-none" />
              <button onClick={invite} disabled={!draft.trim()}
                className="bg-blue-600 hover:bg-blue-700 disabled:bg-slate-200 disabled:text-slate-400 text-white text-[12.5px] font-medium px-3 py-1.5 rounded-md focus-ring">
                Invite

            {people.length > 0 && (
              <div className="mt-3 space-y-1">
                {people.map(p => (
                  <div key={p.email} className="group flex items-center justify-between gap-2 text-[12.5px] py-1 px-1 -mx-1 rounded hover:bg-slate-50">
                    <div className="flex items-center gap-2 min-w-0">

function Dashboard({ dashboard, dashboardId, extras, replacements, onDrill, onRemoveWidget, replaceTarget, onPerformReplace, onCancelReplace, titleOverride, widgetTitleOverrides, widgetSizeOverrides, widgetOrder, onRenameDashboard, onRenameWidget, onResizeWidget, onReorderWidget }) {
  const baseCount = dashboard.widgets.length;
  const merged = [...dashboard.widgets, ...(extras || [])];
  const widgets = merged.map((w, i) => (replacements && replacements[i]) ? replacements[i] : w);
  const inReplaceMode = !!replaceTarget;
  const effectiveTitle = titleOverride || dashboard.title;
  const order = (widgetOrder && widgetOrder.length === widgets.length) ? widgetOrder : widgets.map((_, i) => i);
  const [dragFrom, setDragFrom] = useState(null);
  const [dragOver, setDragOver] = useState(null);
  const widgetRefs = useRef([]);

  const startDrag = (fromIdx) => {
    setDragFrom(fromIdx);
    setDragOver(null);
    let currentOver = null;
    const onMove = (e) => {
      const el = document.elementFromPoint(e.clientX, e.clientY);
      let node = el;
      let found = null;
      while (node && node !== document.body) {
        if (node.dataset && node.dataset.widgetIdx != null) {
          found = parseInt(node.dataset.widgetIdx, 10);
          break;
        }
        node = node.parentElement;
      }
      if (found !== currentOver) {
        currentOver = found;
        setDragOver(found);
      }
    };
    const onUp = () => {
      document.removeEventListener("pointermove", onMove);
      document.removeEventListener("pointerup", onUp);
      document.removeEventListener("mousemove", onMove);
      document.removeEventListener("mouseup", onUp);
      document.body.style.cursor = "";
      document.body.style.userSelect = "";
      if (currentOver != null && currentOver !== fromIdx && onReorderWidget) {
        onReorderWidget(dashboardId, fromIdx, currentOver);
      }
      setDragFrom(null);
      setDragOver(null);
    };
    document.addEventListener("pointermove", onMove);
    document.addEventListener("pointerup", onUp);
    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp);
    document.body.style.cursor = "grabbing";
    document.body.style.userSelect = "none";
  };
  return (
    <div className="max-w-6xl mx-auto px-6 py-6">
      {inReplaceMode && (
        <div className="mb-4 flex items-center justify-between gap-3 px-4 py-2.5 rounded-lg border border-blue-200 bg-blue-50">
          <div className="flex items-center gap-2 min-w-0 text-[13px] text-blue-900">
            <span className="text-blue-600 flex-shrink-0">{I.refresh}</span>
            <span className="truncate">Click a widget to replace it with <span className="font-semibold">"{replaceTarget.response.title}"</span> · press Esc to cancel</span>
          </div>
          <button onClick={onCancelReplace}
            className="text-[12px] font-medium text-blue-700 hover:bg-blue-100 px-2 py-1 rounded focus-ring flex-shrink-0">
            Cancel
          </button>
        </div>
      )}
      <div className="mb-5 flex items-start justify-between gap-4">
        <div className="min-w-0 flex-1">
          <h1 className="text-xl font-semibold text-slate-900">
            {onRenameDashboard
              ? <EditableTitle value={effectiveTitle} onSave={(t) => onRenameDashboard(dashboardId, t)} className="text-xl font-semibold text-slate-900" inputClassName="text-xl font-semibold text-slate-900 w-full" />
              : effectiveTitle}
          </h1>
          <p className="text-[13px] text-slate-500 mt-1">{dashboard.description}</p>
        </div>
        <div className="flex items-center gap-1 flex-shrink-0">
          <ShareDashboardMenu dashboard={dashboard} />
        </div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(6, minmax(0, 1fr))", gap: "0.75rem" }}>
        {order.map((origIdx, displayIdx) => {
          const w = widgets[origIdx];
          const added = origIdx >= baseCount;
          const titleOverride = widgetTitleOverrides && widgetTitleOverrides[origIdx];
          const sizeOverride = widgetSizeOverrides && widgetSizeOverrides[origIdx];
          const effective = { ...w, ...(titleOverride ? { title: titleOverride } : {}), ...(sizeOverride ? { size: sizeOverride } : {}) };
          const dragEnabled = !!onReorderWidget && !inReplaceMode;
          return <Widget key={origIdx} widget={effective} added={added} onDrill={onDrill}
                         onRemove={added && onRemoveWidget && !inReplaceMode ? () => onRemoveWidget(origIdx - baseCount) : null}
                         replaceMode={inReplaceMode}
                         onReplaceClick={inReplaceMode ? () => onPerformReplace(origIdx) : null}
                         onRename={onRenameWidget && !inReplaceMode ? (newTitle) => onRenameWidget(dashboardId, origIdx, newTitle) : null}
                         onResize={onResizeWidget && !inReplaceMode ? (newSize) => onResizeWidget(dashboardId, origIdx, newSize) : null}
                         dragEnabled={dragEnabled}
                         isDragging={dragFrom === displayIdx}
                         isDropTarget={dragOver === displayIdx && dragFrom != null && dragFrom !== displayIdx}
                         widgetRef={(el) => { widgetRefs.current[displayIdx] = el; }}
                         displayIdx={displayIdx}
                         onDragHandleMouseDown={(e) => { e.preventDefault(); e.stopPropagation(); startDrag(displayIdx); }} />;
        })}
      </div>
    </div>
  );
}

/* Dual-pane layout — dashboard pinned to the main canvas (left), chat
   continues on the right. Both toolbars are removed; a small floating
   Close button in the top-right corner of the canvas exits dashboard mode.
   Empty chat state shows a hint so the user knows they can ask follow-ups. */
function DualPane({ activeDashboard, messages, loading, onSend, onPickFollowup, onPickPrompt, scrollRef, dashboardExtras, dashboardReplacements, onAddToDashboard, activeDashboardId, activeDashboardTitle, onRemoveWidget, onSaveWidget, onStartReplace, replaceTarget, onPerformReplace, onCancelReplace, dashboardTitleOverride, widgetTitleOverrides, widgetSizeOverrides, widgetOrder, onRenameDashboard, onRenameWidget, onResizeWidget, onReorderWidget, libraryItems, personaId }) {
  const dashboard = DASHBOARDS[activeDashboard.dashboardId];
  const containerRef = useRef(null);
  const [chatWidth, setChatWidth] = useState(420);
  const [dragging, setDragging] = useState(false);
  const isSecurityLeader = personaId === "luke" || personaId === "tim" || personaId === "david";
  const [chatOpen, setChatOpen] = useState(true);
  if (!dashboard) return null;
  const isEmpty = messages.length === 0 && !loading;

  const startDrag = (e) => {
    e.preventDefault();
    const startX = e.clientX;
    const startWidth = chatWidth;
    setDragging(true);
    const onMove = (ev) => {
      const containerW = containerRef.current?.offsetWidth || 1000;
      const delta = startX - ev.clientX;
      const next = Math.max(320, Math.min(Math.round(containerW * 0.65), startWidth + delta));
      setChatWidth(next);
    };
    const onUp = () => {
      document.removeEventListener("mousemove", onMove);
      document.removeEventListener("mouseup", onUp);
      document.body.style.cursor = "";
      document.body.style.userSelect = "";
      setDragging(false);
    };
    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp);
    document.body.style.cursor = "col-resize";
    document.body.style.userSelect = "none";
  };

  const conversationPanel = (
    <div className="flex-1 flex flex-col min-h-0 overflow-hidden">
      {isEmpty ? (
        <div className="flex-1 flex flex-col items-center justify-center px-6 text-center">
          <div className="w-10 h-10 rounded-full bg-blue-50 text-blue-600 grid place-items-center mb-3">{I.spark}</div>
          <p className="text-[13px] text-slate-700 font-medium">Ask anything about this dashboard</p>
          <p className="text-[12px] text-slate-400 mt-1">Drill into a widget, change a filter, or pick one of the suggested follow-ups.</p>
        </div>
      ) : (
        <Conversation messages={messages} loading={loading} onPickFollowup={onPickFollowup}
                      scrollRef={scrollRef} onAddToDashboard={onAddToDashboard}
                      activeDashboardId={activeDashboardId} activeDashboardTitle={activeDashboardTitle}
                      onStartReplace={onStartReplace} onSaveWidget={onSaveWidget} />
      )}
      <PromptInput onSend={onSend} busy={loading} onPickPrompt={onPickPrompt} libraryItems={libraryItems} />
    </div>
  );

  return (
    <div ref={containerRef} className="flex-1 flex overflow-hidden min-h-0">
      {/* Main canvas */}
      <div className="flex-1 flex flex-col min-w-0">
        <div className="flex-1 overflow-y-auto grid-bg">
          <Dashboard dashboard={dashboard} dashboardId={activeDashboardId} extras={dashboardExtras} replacements={dashboardReplacements} onDrill={onPickFollowup} onRemoveWidget={onRemoveWidget}
                     replaceTarget={replaceTarget} onPerformReplace={onPerformReplace} onCancelReplace={onCancelReplace}
                     titleOverride={dashboardTitleOverride} widgetTitleOverrides={widgetTitleOverrides} widgetSizeOverrides={widgetSizeOverrides} widgetOrder={widgetOrder}
                     onRenameDashboard={onRenameDashboard} onRenameWidget={onRenameWidget} onResizeWidget={onResizeWidget} onReorderWidget={onReorderWidget} />
        </div>
      </div>

      {isSecurityLeader ? (
        /* Security Leader: collapsible tab on the right edge */
        <div className="flex-shrink-0 flex" style={{ position: "relative" }}>
          {/* Collapsed tab — always visible */}
          <button
            onClick={() => setChatOpen(o => !o)}
            title={chatOpen ? "Collapse AI Assistant" : "Expand AI Assistant"}
            className="flex-shrink-0 flex flex-col items-center justify-center gap-2 bg-blue-800 border-l border-blue-900 hover:bg-blue-700 transition-colors"
            style={{ width: 32 }}
          >
            <div className="w-5 h-5 rounded-full bg-blue-600 text-white grid place-items-center flex-shrink-0">
              {I.spark}
            </div>
            <span
              className="text-[10px] font-semibold tracking-wide text-blue-100 uppercase select-none"
              style={{ writingMode: "vertical-rl", textOrientation: "mixed", transform: "rotate(180deg)" }}
            >
              AI Assistant
            </span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={1.75} strokeLinecap="round" strokeLinejoin="round" className="w-3 h-3 text-blue-200 flex-shrink-0" style={{ transform: chatOpen ? "rotate(0deg)" : "rotate(180deg)", transition: "transform 0.2s" }}>
              <path d="M9 18l6-6-6-6" />
            </svg>
          </button>

          {/* Expanded panel — slides in */}
          {chatOpen && (
            <>
              {/* Resize handle */}
              <div
                onMouseDown={startDrag}
                title="Drag to resize the chat panel"
                className={`flex-shrink-0 w-1 cursor-col-resize transition-colors ${dragging ? "bg-blue-500" : "bg-slate-200 hover:bg-blue-400"}`}
              />
              <div style={{ width: chatWidth }} className="flex-shrink-0 flex flex-col bg-white border-l border-slate-100">
                {/* Panel header with collapse button */}
                <div className="flex items-center justify-between px-3 py-2 border-b border-slate-100 flex-shrink-0">
                  <div className="flex items-center gap-1.5">
                    <div className="w-5 h-5 rounded-full bg-blue-100 text-blue-600 grid place-items-center">{I.spark}</div>
                    <span className="text-[12px] font-semibold text-slate-700">AI Assistant</span>
                  </div>
                  <button onClick={() => setChatOpen(false)} className="text-slate-400 hover:text-slate-600 transition-colors p-0.5 rounded">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={1.75} strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4">
                      <path d="M18 6L6 18M6 6l12 12" />
                    </svg>
                  </button>
                </div>
                {conversationPanel}
              </div>
            </>
          )}
        </div>
      ) : (
        /* All other personas: always-visible side panel */
        <>
          <div
            onMouseDown={startDrag}
            title="Drag to resize the chat panel"
            className={`flex-shrink-0 w-1 cursor-col-resize transition-colors ${dragging ? "bg-blue-500" : "bg-slate-200 hover:bg-blue-400"}`}
          />
          <div style={{ width: chatWidth }} className="flex-shrink-0 flex flex-col bg-white">
            {conversationPanel}
          </div>
        </>
      )}
    </div>
  );
}

/* Convert an in-chat response card into a dashboard widget. Returns null
   for response types that don't have a chart payload to add. */
function responseToWidget(r) {
  if (r.chartType === "kpi+line" && r.series) return { type: "line", size: "full", title: r.title, series: r.series, xLabels: r.xLabels || [], anomalies: r.anomalies || [], forecastIndex: r.forecastIndex ?? null };
  if (r.chartType === "kpi"      && r.kpis)   return { type: "kpi", size: "full", title: r.title, kpis: r.kpis };
  if (r.chartType === "hbar"     && r.bars)   return { type: "hbar", size: "full", title: r.title, bars: r.bars };
  if (r.chartType === "donut"    && r.slices) return { type: "donut", size: "half", title: r.title, slices: r.slices };
  if (r.chartType === "table"    && r.table)  return { type: "table", size: "full", title: r.title, columns: r.table.columns, rows: r.table.rows };
  return null;
}

function App() {
  const toast = useToast();
  const [messages, setMessages] = useState([]);
  const [loading, setLoading] = useState(false);
  const [activeDashboard, setActiveDashboard] = useState(null);
  const [dashboardExtras, setDashboardExtras] = useState({});
  const [dashboardReplacements, setDashboardReplacements] = useState({});
  const [dashboardTitleOverrides, setDashboardTitleOverrides] = useState({});
  const [widgetTitleOverrides, setWidgetTitleOverrides] = useState({});
  const [widgetSizeOverrides, setWidgetSizeOverrides] = useState({});
  const [widgetOrderOverrides, setWidgetOrderOverrides] = useState({});
  const [replaceTarget, setReplaceTarget] = useState(null);
  const [savedWidgets, setSavedWidgets] = useState([]);
  const [userAgents, setUserAgents] = useState([]);
  const [showWelcome, setShowWelcome] = useState(true);
  const [personaId, setPersonaId] = useState("luke");
  const persona = PERSONAS[personaId] || PERSONAS.luke;
  const onChangePersona = (id) => {
    setPersonaId(id);
    setMessages([]);
    setShowWelcome(false);
    const DEFAULT_DASHBOARD_BY_PERSONA = {
      luke: { dashboardId: "soc-dlp-monitoring", title: "DLP Incident Monitoring", desc: "Policy violations, top policies, apps and DLP rules" },
      tim:   { dashboardId: "dlp-destinations", title: "Sensitive Data Movement", desc: "Destinations, file types, sanctioned trend" },
      david: { dashboardId: "dlp-users",        title: "Risky User Behaviors",               desc: "Top users, baseline, month comparison" },
    };
    const defaultItem = DEFAULT_DASHBOARD_BY_PERSONA[id] || null;
    setActiveDashboard(defaultItem);
    if (defaultItem) {
      const dash = DASHBOARDS[defaultItem.dashboardId];
      if (dash) setMessages([
        { role: "user", text: `Open the "${defaultItem.title}" dashboard` },
        { role: "ai", text: dash.summary || dash.description, examples: dash.examplePrompts || [] },
      ]);
    }
    toast(`Switched to ${PERSONAS[id].role}`, { kind: "info" });
  };
  const scrollRef = useRef(null);

  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [messages, loading]);

  const send = (text, knownResponseId) => {
    setShowWelcome(false);
    setMessages(m => [...m, { role: "user", text }]);
    setLoading(true);
    setTimeout(() => {
      const id = knownResponseId || classifyPrompt(text);
      const response = RESPONSES[id] || RESPONSES.freeform;
      setMessages(m => [...m, { role: "ai", response }]);
      setLoading(false);
    }, 1000);
  };

  const onQuickAction = (action) => send(action.title, action.responseId);
  const onFollowup = (text, id) => send(text, id);
  const onPickPrompt = (text) => send(text);
  const reset = () => { setMessages([]); setActiveDashboard(null); setShowWelcome(true); };

  /* Restore a previous session in place — replaces the current conversation
     with the saved messages so the user picks up where they left off. */
  const onPickHistory = (item) => {
    setActiveDashboard(null);
    const restored = item.messages.map(m =>
      m.role === "ai"
        ? { role: "ai", response: RESPONSES[m.responseId] || RESPONSES.freeform }
        : { role: "user", text: m.text }
    );
    setMessages(restored);
  };

  /* Open a predefined dashboard in dual-pane mode: dashboard pinned to the
     main canvas, and the chat is seeded with a plain-language summary plus
     a couple of example prompts so the user has an immediate starting point. */
  const onPickDashboard = (item) => {
    setShowWelcome(false);
    setActiveDashboard(item);
    const dash = DASHBOARDS[item.dashboardId];
    if (!dash) { setMessages([]); return; }
    setMessages([
      { role: "user", text: `Open the "${item.title}" dashboard` },
      { role: "ai", text: dash.summary || dash.description, examples: dash.examplePrompts || [] },
    ]);
  };

  const exitDashboard = () => setActiveDashboard(null);

  /* Open a pre-built agent: seed the conversation with the agent's flowchart
     so it appears as a single rich message, plus follow-up chips for viewing
     the report and editing the configuration. */
  const createAgent = (agent) => {
    setUserAgents(prev => prev.some(a => a.id === agent.id) ? prev : [...prev, agent]);
  };

  const onPickAgent = (agent) => {
    setActiveDashboard(null);
    if (agent.isNew) {
      const blank = {
        id: "agent-new",
        category: "New",
        name: "",
        desc: "",
        isNew: true,
        lastRunDate: "—",
        nextRunDate: "—",
        duration: "—",
        status: "Draft",
        succeeded: 0,
        skipped: 0,
        config: {
          name:        "",
          triggerType: "manual",
          trigger:     "",
          scheduleFrequency: "weekly",
          scheduleDay:       "Monday",
          scheduleDayOfMonth:"1",
          scheduleTime:      "10:00 AM",
          schedule:    "Weekly · Monday · 10:00 AM",
          dataType:    "tenant",
          dataSource:  "naa-tenant",
          mcpServer:   "",
          data:        "Only fetch data from naa-tenant",
          summary:     "",
          analysis:    "",
          artifact:    "",
          destination: "",
        },
        nodes: [
          { id: "trigger",  title: "Manual trigger",   icon: "hand",     subtitle: "—", duration: "—", status: "ok",      color: "amber" },
          { id: "data",     title: "Data",             icon: "database", subtitle: "—", duration: "—", status: "ok",      color: "blue" },
          { id: "summary",  title: "Summary",          icon: "doc",      subtitle: "—", duration: "—", status: "ok",      color: "emerald", branch: "top" },
          { id: "analysis", title: "Analysis",         icon: "chart",    subtitle: "—", duration: "—", status: "ok",      color: "emerald", branch: "bottom" },
          { id: "artifact", title: "Artifact Builder", icon: "doc",      subtitle: "—", duration: "—", status: "ok",      color: "rose" },
          { id: "email",    title: "Email",            icon: "email",    subtitle: "—", duration: "—", status: "skipped", color: "fuchsia" },
        ],
        reportId: "agent-soc-behavior-report",
      };
      const response = {
        title: "New agent",
        chartType: "agent-flow",
        agent: blank,
        summary: "Configure a new agent below. Define a trigger, data source, AI reasoning instructions, artifact, and delivery destination — then save to add it to your agent library.",
        followUps: [],
      };
      setMessages([
        { role: "user", text: "Add a new agent" },
        { role: "ai",   response },
      ]);
      return;
    }
    const baseResponse = RESPONSES[agent.id] || {
      title: agent.name,
      chartType: "agent-flow",
      summary: `User-created agent. ${agent.config?.trigger || ""}`.trim(),
      followUps: [],
    };
    const response = { ...baseResponse, agent };
    setMessages([
      { role: "user", text: `Open the "${agent.name}" agent` },
      { role: "ai",   response },
    ]);
  };

  /* Add an in-chat chart to ANY dashboard. Works whether or not a dashboard
     is currently open in dual-pane mode — the user picks the target from the
     menu. */
  const addToDashboard = (response, dashboardId) => {
    const widget = responseToWidget(response);
    if (!widget) {
      toast(`Can't add — chart type "${response.chartType}" isn't a widget`, { kind: "error" });
      return;
    }
    addWidgetToDashboard(widget, response.title, dashboardId);
  };

  /* Append an already-converted widget directly to a dashboard. Used both
     by addToDashboard (after converting a response) and by the Widgets
     library (whose entries are already widgets). */
  const addWidgetToDashboard = (widget, title, dashboardId) => {
    setDashboardExtras(prev => ({
      ...prev,
      [dashboardId]: [...(prev[dashboardId] || []), widget],
    }));
    setWidgetOrderOverrides(prev => {
      if (!prev[dashboardId]) return prev;
      const dash = DASHBOARDS[dashboardId];
      const newIdx = dash.widgets.length + ((dashboardExtras[dashboardId] || []).length);
      return { ...prev, [dashboardId]: [...prev[dashboardId], newIdx] };
    });
    const dashTitle = DASHBOARD_ITEMS.flatMap(g => g.items).find(d => d.dashboardId === dashboardId)?.title || "dashboard";
    toast(`Added "${title}" → ${dashTitle}`);
  };

  /* Save an in-chat chart to the personal Widgets library. The widget can
     later be added to any dashboard from the Widgets dropdown. */
  const saveWidget = (response) => {
    const widget = responseToWidget(response);
    if (!widget) {
      toast(`Can't save — chart type "${response.chartType}" isn't a widget`, { kind: "error" });
      return;
    }
    setSavedWidgets(prev => [
      { id: `w-${Date.now()}`, title: response.title, widget, savedAt: new Date(), personaRole: persona.role },
      ...prev,
    ]);
    toast(`Saved as widget — "${response.title}"`);
  };

  const removeSavedWidget = (id) => {
    setSavedWidgets(prev => prev.filter(w => w.id !== id));
    toast("Removed from Widgets library", { kind: "info" });
  };
  const renameSavedWidget = (id, newTitle) => {
    setSavedWidgets(prev => prev.map(w => w.id === id ? { ...w, title: newTitle } : w));
    toast("Widget renamed");
  };
  const renameDashboard = (dashboardId, newTitle) => {
    setDashboardTitleOverrides(prev => ({ ...prev, [dashboardId]: newTitle }));
    toast("Dashboard renamed");
  };
  const renameWidget = (dashboardId, widgetIndex, newTitle) => {
    setWidgetTitleOverrides(prev => ({
      ...prev,
      [dashboardId]: { ...(prev[dashboardId] || {}), [widgetIndex]: newTitle },
    }));
    toast("Widget renamed");
  };
  const resizeWidget = (dashboardId, widgetIndex, newSize) => {
    setWidgetSizeOverrides(prev => ({
      ...prev,
      [dashboardId]: { ...(prev[dashboardId] || {}), [widgetIndex]: newSize },
    }));
  };
  const reorderWidget = (dashboardId, fromDisplayIdx, toDisplayIdx) => {
    if (fromDisplayIdx === toDisplayIdx || fromDisplayIdx == null || toDisplayIdx == null) return;
    const dash = DASHBOARDS[dashboardId];
    if (!dash) return;
    const total = dash.widgets.length + ((dashboardExtras[dashboardId] || []).length);
    setWidgetOrderOverrides(prev => {
      const current = prev[dashboardId] || Array.from({ length: total }, (_, i) => i);
      const next = [...current];
      const [moved] = next.splice(fromDisplayIdx, 1);
      next.splice(toDisplayIdx, 0, moved);
      return { ...prev, [dashboardId]: next };
    });
  };

  /* Enter replace mode — the dashboard pane shows a banner and each
     widget gets a "Replace with this" overlay. Clicking a widget swaps
     the new visualization in place via performReplace. */
  const startReplaceMode = (response) => {
    if (!activeDashboard) return;
    const widget = responseToWidget(response);
    if (!widget) {
      toast(`Can't replace — chart type "${response.chartType}" isn't a widget`, { kind: "error" });
      return;
    }
    setReplaceTarget({ response, widget, dashboardId: activeDashboard.dashboardId });
  };
  const cancelReplaceMode = () => setReplaceTarget(null);
  const performReplace = (widgetIndex) => {
    if (!replaceTarget) return;
    const { widget, response, dashboardId } = replaceTarget;
    setDashboardReplacements(prev => ({
      ...prev,
      [dashboardId]: { ...(prev[dashboardId] || {}), [widgetIndex]: widget },
    }));
    setReplaceTarget(null);
    toast(`Replaced with "${response.title}"`);
  };
  useEffect(() => {
    if (!replaceTarget) return;
    const handler = (e) => { if (e.key === "Escape") cancelReplaceMode(); };
    document.addEventListener("keydown", handler);
    return () => document.removeEventListener("keydown", handler);
  }, [replaceTarget]);

  /* Remove a previously-added widget from a dashboard. Only user-added
     widgets are removable; base widgets defined in DASHBOARDS are not. */
  const removeWidget = (dashboardId, extraIndex) => {
    setDashboardExtras(prev => ({
      ...prev,
      [dashboardId]: (prev[dashboardId] || []).filter((_, i) => i !== extraIndex),
    }));
    setWidgetOrderOverrides(prev => {
      if (!prev[dashboardId]) return prev;
      const dash = DASHBOARDS[dashboardId];
      const removedMergedIdx = dash.widgets.length + extraIndex;
      const next = prev[dashboardId]
        .filter(i => i !== removedMergedIdx)
        .map(i => i > removedMergedIdx ? i - 1 : i);
      return { ...prev, [dashboardId]: next };
    });
    toast("Widget removed from dashboard", { kind: "info" });
  };

  const isEmpty = messages.length === 0 && !loading;

  return (
    <div className="app-shell">
      <div className="app-chrome-header">
        <div className="app-chrome-header-left" />
        <div className="app-chrome-header-right" />
      </div>
      <div className="app-chrome-sidebar">
        <div className="app-chrome-sidebar-top" />
        <div className="app-chrome-sidebar-bottom" />
      </div>
      <div className="content-region">
        <ContentControls onNewChat={reset} onPickPrompt={onPickPrompt}
                         onPickHistory={onPickHistory} onPickDashboard={onPickDashboard}
                         onPickAgent={onPickAgent} userAgents={userAgents}
                         persona={persona} onChangePersona={onChangePersona}
                         savedWidgets={savedWidgets}
                         onAddWidgetToDashboard={addWidgetToDashboard}
                         onRemoveSavedWidget={removeSavedWidget}
                         onRenameSavedWidget={renameSavedWidget}
                         hidePersonaSwitcher={showWelcome} />
        {showWelcome ? (
          <WelcomePage onSend={send} busy={loading} libraryItems={getLibraryFor(personaId)}
                       persona={persona} onChangePersona={onChangePersona} />
        ) : (
          <>
            {activeDashboard ? (
              <DualPane activeDashboard={activeDashboard} messages={messages} loading={loading}
                        onSend={send} onPickFollowup={onFollowup} onExit={exitDashboard}
                        onPickPrompt={onPickPrompt} scrollRef={scrollRef} personaId={personaId}
                        dashboardExtras={dashboardExtras[activeDashboard.dashboardId]}
                        dashboardReplacements={dashboardReplacements[activeDashboard.dashboardId]}
                        onAddToDashboard={addToDashboard}
                        activeDashboardId={activeDashboard.dashboardId}
                        activeDashboardTitle={activeDashboard.title}
                        onRemoveWidget={(idx) => removeWidget(activeDashboard.dashboardId, idx)}
                        onSaveWidget={saveWidget}
                        onStartReplace={startReplaceMode}
                        replaceTarget={replaceTarget}
                        onPerformReplace={performReplace}
                        onCancelReplace={cancelReplaceMode}
                        dashboardTitleOverride={dashboardTitleOverrides[activeDashboard.dashboardId]}
                        widgetTitleOverrides={widgetTitleOverrides[activeDashboard.dashboardId]}
                        widgetSizeOverrides={widgetSizeOverrides[activeDashboard.dashboardId]}
                        widgetOrder={widgetOrderOverrides[activeDashboard.dashboardId]}
                        onRenameDashboard={renameDashboard}
                        onRenameWidget={renameWidget}
                        onResizeWidget={resizeWidget}
                        onReorderWidget={reorderWidget}
                        libraryItems={getLibraryFor(personaId)} />
            ) : (
              <>
                {isEmpty ? <Landing onPick={onQuickAction} persona={persona} /> :
                  <Conversation messages={messages} loading={loading} onPickFollowup={onFollowup}
                                scrollRef={scrollRef} onAddToDashboard={addToDashboard}
                                onSaveWidget={saveWidget} onCreateAgent={createAgent} />}
                <PromptInput onSend={send} busy={loading} onPickPrompt={onPickPrompt} libraryItems={getLibraryFor(personaId)} />
              </>
            )}
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ToastProvider><App /></ToastProvider>
);
    </script>
  </body>
</html>
